# Config that produced the IF-Split-2026.05.31 example (full PDB, today's cutoff).
# Identical to config/default.yaml except snapshot_date is pinned to 2026-05-31.
# Quality caps left OFF here to show the baseline split; enable them to filter on
# the wwPDB validation report (see README).

snapshot_date: "2026-05-31"        # release_date <= this. The reproducibility anchor.
experimental_methods: ["X-RAY DIFFRACTION", "ELECTRON MICROSCOPY"]
resolution_max_A: 3.5
resolution_max_A_by_method: {}     # baseline; one resolution cap for all methods
max_total_residues: 5999           # max residues KEPT (drop if > this); LigandMPNN kept < 6000
min_modeled_residues: 0            # baseline; only the always-on empty/all-X (poly-UNK) drop applies
excluded_het: ["HOH", "NA", "CL", "K", "BR"]
use_biological_assembly: true

purification_metals: ["NI", "CO"]
histag_min_run: 6
exclude_purification_artifacts: true

identity_threshold: 0.30
clustering_backend: "precomputed"
structural_clustering: "off"       # fold-leakage control (opt-in: off | cath | ecod | scop2)
split_fractions: {train: 0.80, val: 0.10, test: 0.10}
split_salt: "snapsplit-v1"
seed: 0

# Quality filters (off in this example).
max_clashscore: null
max_rfree: null
max_ramachandran_outlier_pct: null
max_rotamer_outlier_pct: null
max_rsrz_outlier_pct: null
min_em_backbone_inclusion: null
require_validation_report: false

ligand_context_radius_A: 8.0
max_ligand_atoms: 25
