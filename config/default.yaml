# IF-Split run configuration — the single source of truth for a build.
#
# Every parameter here affects the output. The config is hashed (canonical,
# formatting-independent) and the hash is embedded in the manifest, so two
# manifests with the same config-hash used identical settings.

snapshot_date: "2026-05-30"        # release_date <= this. The reproducibility anchor.
experimental_methods: ["X-RAY DIFFRACTION", "ELECTRON MICROSCOPY"]
resolution_max_A: 3.5
max_total_residues: 5999           # LigandMPNN used "< 6000"
excluded_het: ["HOH", "NA", "CL", "K", "BR"]   # waters + common crystallization ions
use_biological_assembly: true      # biounits, as in LigandMPNN (assembly 1)

# Curation: purification-artifact detection (Stage 4). A poly-His tag that
# coordinates Ni/Co is an artifact of affinity purification, not a biological
# metal site — a known blemish in the LigandMPNN metal set. An entry whose only
# metal is a purification metal AND that carries a His-tag (a >= histag_min_run
# run anywhere, OR a >= histag_terminal_min_run run at a chain terminus — to
# catch 6xHis tags left partial by unmodeled/trimmed residues) is flagged as an
# artifact. Set purification_metals: [] to disable.
#
# Even without a detectable tag, a *lone* Ni/Co with no measured affinity is
# demoted from `functional` to `ambiguous` (reported, not labelled): ~82% of lone
# Ni/Co in the PDB carry no detectable His-tag (IMAC tags are often absent from
# the deposited SEQRES), so a bare contact is weak evidence of a biological metal
# site. This re-tiers roughly 70% of the lone-Ni/Co set and does over-fire on some
# real bare-Ni/Co enzymes, which the annotate-never-drop tier keeps recoverable.
# Real metals (Zn, Mg, Fe, Mn, …) and Ni/Co alongside another real metal or with
# affinity are unaffected. See scripts/audit_nico_histag.py for the derivation.
purification_metals: ["NI", "CO"]
histag_min_run: 6
histag_terminal_min_run: 3
exclude_purification_artifacts: true

identity_threshold: 0.30           # clustering cutoff (Data API levels: 30/50/70/90/95/100)
clustering_backend: "precomputed"  # "precomputed" (reuse RCSB clusters) | "mmseqs2" (run our own)
split_fractions: {train: 0.80, val: 0.10, test: 0.10}
split_salt: "snapsplit-v1"         # bump to reshuffle intentionally
seed: 0

# Optional test-set stratification top-up. A floor on the number of test entries
# carrying each functional ligand class. Empty = off (pure deterministic hash).
# When set, after the base split any class below its floor recruits WHOLE sequence
# components (never individual entries -> no leakage) into test, in deterministic
# hash order, skipping registry-pinned components (growth stays stable). A floor
# larger than the available supply is met as far as possible; the shortfall is
# reported in the manifest, not forced. Example: {metal: 500, nucleic_acid: 200}
test_min_per_class: {}

# Quality filters (Stage 3) — wwPDB validation-report metrics, fetched as
# metadata (NO coordinate download). Each cap is optional: null disables it. An
# entry is dropped only when the metric is present AND exceeds the cap; entries
# whose report lacks a metric are kept (never penalized for an absent metric).
# Geometry caps (clashscore/Ramachandran/rotamer) apply to BOTH X-ray and cryo-EM;
# diffraction caps (R-free/RSRZ) are X-ray-only and no-op on EM. Defaults are off
# so the snapshot is unchanged until you opt in; suggested high-quality starting
# points are shown in the trailing comments.
max_clashscore: null                 # e.g. 40    (all-atom clashes/1000 atoms; lower=better)
max_rfree: null                      # e.g. 0.30  (X-ray DCC R-free)
max_ramachandran_outlier_pct: null   # e.g. 1.0   (% backbone Ramachandran outliers)
max_rotamer_outlier_pct: null        # e.g. 5.0   (% sidechain rotamer outliers)
max_rsrz_outlier_pct: null           # e.g. 20    (% real-space-R Z-score outliers, X-ray)
require_validation_report: false     # drop entries lacking a validation report entirely

# Ligand context (downstream-optional; featurization, not split definition).
ligand_context_radius_A: 8.0
max_ligand_atoms: 25
